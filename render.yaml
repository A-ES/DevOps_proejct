services:
  - type: web
    name: devops-agent-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: devops-agent-db
          property: connectionString
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CODING_MODEL_ID
        value: gpt-4o
      - key: REASONING_MODEL_ID
        value: gpt-4o-mini
      - key: FAST_MODEL_ID
        value: gpt-4o-mini
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_ALLOWED_USER_IDS
        sync: false
      - key: CD_WEBHOOK_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_SUBSCRIPTION_ID
        sync: false
      - key: GCP_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false

databases:
  - name: devops-agent-db
    databaseName: devops_agent
    user: devops_agent
