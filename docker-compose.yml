services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devops-agent-postgres
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      POSTGRES_DB: devops_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: devops-agent-api
    env_file:
      - server/.env
    environment:
      DATABASE_URL: postgresql://devops:devops@postgres:5432/devops_agent
      API_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: devops-agent-client
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres_data:
